version: 2

# Dependabot keeps the base image and the workflow actions current. The camoufox
# pip pin is handled separately by track-upstream.yml, and the mise tool
# versions are bumped by hand (Dependabot has no mise ecosystem).
updates:
  # Bump the python:3.12-slim-bookworm base image in the Dockerfile.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore

  # Bump the action versions used in the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
