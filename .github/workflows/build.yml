name: build

# Build the Camoufox server image and push it to GHCR.
#
# Triggers:
#   - push to main so code changes ship straight away
#   - manual dispatch for ad-hoc rebuilds
#   - a daily schedule so a fresh image is rebuilt even when nothing changed
#     (picks up base image security fixes)
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 06:00 UTC daily. Runs after track-upstream so a version bump PR/dispatch
    # from the same morning can be picked up.
    - cron: "0 6 * * *"

env:
  IMAGE: ghcr.io/rjocoleman/camoufox-server

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # The image tag follows the pinned browser version (the Firefox build is
      # what consumers care about), read from the Dockerfile ARG so the tag
      # always matches what actually got installed. Both pins are baked in via
      # their Dockerfile ARG defaults, so no build-args are passed.
      - name: Resolve browser version
        id: version
        run: |
          version="$(grep -E '^ARG CAMOUFOX_BROWSER_VERSION=' Dockerfile | head -n1 | cut -d= -f2)"
          echo "browser_version=$version" >> "$GITHUB_OUTPUT"

      # QEMU lets us build linux/arm64 on the amd64 runner. Upstream ships a
      # lin.arm64 Camoufox build, so arm64 is feasible; it is emulated here and
      # noticeably slower than amd64, but the resulting image is native.
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.browser_version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
