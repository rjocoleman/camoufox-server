name: build

# Build the Camoufox server image, smoke-test it, and push it to GHCR.
#
# Triggers:
#   - push to main so code changes ship straight away
#   - manual dispatch for ad-hoc rebuilds
#   - a daily schedule so a fresh image is rebuilt even when nothing changed
#     (picks up base image security fixes)
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 06:00 UTC daily. Runs after track-upstream so a version bump PR/dispatch
    # from the same morning can be picked up.
    - cron: "0 6 * * *"

env:
  IMAGE: ghcr.io/rjocoleman/camoufox-server

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # The image tag follows the pinned browser version (the Firefox build is
      # what consumers care about), read from the Dockerfile ARG so the tag
      # always matches what actually got installed. We also read the pinned
      # playwright version so the smoke-test client speaks the same protocol
      # version as the server. Both pins are baked in via their Dockerfile ARG
      # defaults, so no build-args are passed.
      - name: Resolve versions
        id: version
        run: |
          browser="$(grep -E '^ARG CAMOUFOX_BROWSER_VERSION=' Dockerfile | head -n1 | cut -d= -f2)"
          playwright="$(grep -E '^ARG PLAYWRIGHT_VERSION=' Dockerfile | head -n1 | cut -d= -f2)"
          echo "browser_version=$browser" >> "$GITHUB_OUTPUT"
          echo "playwright_version=$playwright" >> "$GITHUB_OUTPUT"

      # QEMU lets us build linux/arm64 on the amd64 runner. Upstream ships a
      # lin.arm64 Camoufox build, so arm64 is feasible; it is emulated here and
      # noticeably slower than amd64, but the resulting image is native.
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the native amd64 image and load it into the local docker so we can
      # exercise it before publishing anything. buildx caches these layers, so
      # the multi-arch push below reuses the amd64 work and only pays for arm64.
      - name: Build amd64 for smoke test
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: camoufox-server:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Start the server and drive it with a real Playwright client. This is the
      # only check that proves the image actually launches and serves a browser
      # over the websocket; the build alone only proves the browser downloaded.
      # A failure here blocks the publish step below.
      - name: Smoke test
        env:
          PLAYWRIGHT_VERSION: ${{ steps.version.outputs.playwright_version }}
          BROWSER_VERSION: ${{ steps.version.outputs.browser_version }}
        run: |
          set -euo pipefail
          docker run -d --name smoke -p 3000:3000 camoufox-server:smoke

          # Wait for launch_server() to print its endpoint (usually a few
          # seconds); fail loudly with the logs if it never does.
          for i in $(seq 1 30); do
            if docker logs smoke 2>&1 | grep -q "Websocket endpoint"; then
              break
            fi
            if [ "$i" = "30" ]; then
              echo "server did not start in time" >&2
              docker logs smoke
              exit 1
            fi
            sleep 2
          done

          # connect() only needs the bundled driver, no browser download.
          python3 -m pip install --quiet "playwright==${PLAYWRIGHT_VERSION}"
          python3 - <<'PY'
          import os
          from playwright.sync_api import sync_playwright

          major = os.environ["BROWSER_VERSION"].split(".", 1)[0]
          with sync_playwright() as p:
              browser = p.firefox.connect("ws://localhost:3000/camoufox")
              page = browser.new_page()
              page.goto("https://example.com")
              title = page.title()
              ua = page.evaluate("navigator.userAgent")
              browser.close()

          assert "Example Domain" in title, f"unexpected title: {title!r}"
          assert f"Firefox/{major}" in ua, f"unexpected user agent: {ua!r}"
          print(f"smoke ok: {title!r} | {ua!r}")
          PY

          docker rm -f smoke

      # Only reached if the smoke test passed. Reuses the cached amd64 layers
      # and builds arm64 on top, then pushes the multi-arch manifest.
      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.browser_version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
